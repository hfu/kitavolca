<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>kitavolca プレビュー — 北海道火山図 VBM/VLCM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@digital-go-jp/design-tokens@2.0.1/dist/tokens.css">
<link rel="stylesheet" href="dads-components.css">
<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
  #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  /* Ported from faceless-cartographer's index.html: DADS semantic-color
     notice box, used here for the style.json load-failure message instead
     of an ad-hoc inline color. */
  .notice { border-radius: var(--border-radius-8); padding: .5rem .6rem; margin: .4rem 0; font-size: 0.82rem; }
  .notice.error { color: var(--color-semantic-error-1); background: rgba(236, 0, 0, 0.08); }
  .panel {
    position: absolute; top: 0; left: 0; max-width: 22rem; max-height: 100vh;
    display: flex; flex-direction: column;
    background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 0 0 var(--border-radius-12) 0; box-shadow: var(--elevation-1);
    z-index: 10; line-height: 1.45; font-size: 0.88rem;
    transition: width 0.2s ease, height 0.2s ease;
  }
  .panel[data-collapsed="false"] { padding: .9rem 1rem; }
  .panel[data-collapsed="true"] { width: 2.75rem; height: 2.75rem; padding: .4rem; overflow: hidden; }
  .panel__toggle { flex: none; align-self: flex-start; background: transparent; border: none; cursor: pointer; padding: 0.2rem; color: currentColor; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; line-height: 1; }
  .panel[data-collapsed="true"] .panel__toggle svg { transform: scaleX(-1); }
  .panel__content { flex: 1 1 auto; min-height: 0; overflow-y: auto; }
  .panel[data-collapsed="true"] .panel__content { display: none; }
  .panel h1 { font-size: 1rem; margin: 0 0 .4rem; }
  .panel .layers { margin: .5rem 0; }
  .panel .layer-item { margin-bottom: .5rem; }
  .panel .vlcm-legend { margin-top: .3rem; max-height: 12rem; overflow-y: auto; }
  .panel .legend-row { display: flex; align-items: center; gap: .4rem; font-size: .78rem; margin-bottom: .15rem; }
  .panel .legend-swatch { width: .9rem; height: .9rem; border-radius: 2px; flex: none; border: 1px solid rgba(0,0,0,.15); }
  .panel .legend-empty { font-size: .78rem; color: #666; margin: .3rem 0 0; }

  /* Feature popup: reuse the panel's DADS look (blurred white card, same
     radius/elevation tokens, same font sizing) instead of MapLibre's default
     plain white box, so the two floating UI pieces read as one system. */
  .maplibregl-popup-content {
    background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: var(--border-radius-12); box-shadow: var(--elevation-1);
    font-family: system-ui, sans-serif; font-size: 0.82rem; line-height: 1.45;
    padding: .7rem .8rem;
  }
  .maplibregl-popup-anchor-bottom .maplibregl-popup-tip { border-top-color: rgba(255, 255, 255, 0.92); }
  .maplibregl-popup-anchor-top .maplibregl-popup-tip { border-bottom-color: rgba(255, 255, 255, 0.92); }
  .feature-popup .dads-checkbox { padding-top: 0; padding-bottom: .35rem; }
  .feature-popup table { width: 100%; border-collapse: collapse; }
  .feature-popup td { vertical-align: top; padding: .3rem .3rem; border-bottom: 1px solid var(--color-neutral-solid-gray-300); font-size: .8rem; }
  .feature-popup tr:last-child td { border-bottom: none; }
  .feature-popup code { font-size: .72rem; color: var(--color-neutral-solid-gray-800); background: var(--color-neutral-solid-gray-50); padding: .05rem .35rem; border-radius: 4px; white-space: nowrap; }
  .feature-popup .attr-empty { color: var(--color-neutral-solid-gray-600); font-style: italic; }
</style>
</head>
<body>
<div id="map"></div>
<div class="panel" data-collapsed="false">
  <button id="panel-toggle" class="panel__toggle" type="button" aria-expanded="true" aria-label="パネルを折りたたむ/展開する">
    <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" style="display:inline-block;">
      <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <div class="panel__content">
    <h1>kitavolca</h1>
    <div class="layers">
      <div class="layer-item">
        <label class="dads-checkbox" data-size="sm">
          <span class="dads-checkbox__checkbox"><input class="dads-checkbox__input" type="checkbox" data-layer-toggle="bvmap" checked></span>
          <span class="dads-checkbox__label">最適化ベクトルタイル</span>
        </label>
      </div>
      <div class="layer-item">
        <label class="dads-checkbox" data-size="sm">
          <span class="dads-checkbox__checkbox"><input class="dads-checkbox__input" type="checkbox" data-layer-toggle="vbm" checked></span>
          <span class="dads-checkbox__label">火山基本図</span>
        </label>
      </div>
      <div class="layer-item">
        <label class="dads-checkbox" data-size="sm">
          <span class="dads-checkbox__checkbox"><input class="dads-checkbox__input" type="checkbox" data-layer-toggle="vlcm" checked></span>
          <span class="dads-checkbox__label">火山土地条件図</span>
        </label>
        <div class="vlcm-legend"></div>
      </div>
      <div class="layer-item">
        <label class="dads-checkbox" data-size="sm">
          <span class="dads-checkbox__checkbox"><input class="dads-checkbox__input" type="checkbox" data-layer-toggle="seamlessphoto" checked></span>
          <span class="dads-checkbox__label">シームレス空中写真</span>
        </label>
        <label class="dads-checkbox" data-size="sm" style="margin-left:1.5rem;">
          <span class="dads-checkbox__checkbox"><input class="dads-checkbox__input" type="checkbox" id="seamlessphoto-opaque"></span>
          <span class="dads-checkbox__label">不透過</span>
        </label>
      </div>
      <div class="layer-item">
        <label class="dads-checkbox" data-size="sm">
          <span class="dads-checkbox__checkbox"><input class="dads-checkbox__input" type="checkbox" data-layer-toggle="mapterhorn" checked></span>
          <span class="dads-checkbox__label">陰影起伏図</span>
        </label>
      </div>
      <div class="layer-item">
        <label class="dads-checkbox" data-size="sm">
          <span class="dads-checkbox__checkbox"><input class="dads-checkbox__input" type="checkbox" id="terrain-toggle"></span>
          <span class="dads-checkbox__label">三次元表示</span>
        </label>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
